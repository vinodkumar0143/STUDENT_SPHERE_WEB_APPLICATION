<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Student Sphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <header>
        <nav>
            <div class="logo">Student Sphere</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>
    <main class="auth-wrapper">
        <div class="auth-container">
            <h2>Recovery Sphere</h2>
            <p style="text-align: center; color: #64748b; margin-bottom: 2rem;">Enter your email to receive a secure reset link.</p>
            
            <div id="alert-message" class="alert hidden"></div>
            
            <form id="forgot-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required />
                </div>
                <div class="button-group">
                    <button type="submit" id="forgot-btn" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
                </div>
                <div style="text-align: center; margin-top: 1.5rem;">
                    <a href="login.html" class="forgot-link">← Back to Login</a>
                </div>
            </form>
        </div>
    </main>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
