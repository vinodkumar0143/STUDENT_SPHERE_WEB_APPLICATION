<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Student Sphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <header>
        <nav>
            <div class="logo">Student Sphere</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>
    <main class="auth-wrapper">
        <div class="auth-container">
            <h2>Spherical Reset</h2>
            <p style="text-align: center; color: #64748b; margin-bottom: 2rem;">Securely update your password below.</p>
            
            <div id="alert-message" class="alert hidden"></div>
            
            <form id="reset-form" class="auth-form">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter new password" required />
                        <span id="toggle-password" class="toggle-password">👁️</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required />
                </div>
                <div class="button-group">
                    <button type="submit" id="reset-btn" class="btn btn-primary" style="width: 100%;">Update Password</button>
                </div>
            </form>
        </div>
    </main>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
