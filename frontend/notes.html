<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sphere - My Notes</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/chatbot.css">
</head>
<body class="notes-page">
    <header>
        <nav>
            <a href="dashboard.html" class="logo">
                <img src="assets/logo.png" alt="Student Sphere Logo" class="logo-img" loading="lazy">
                <span class="logo-brand-text">Student Sphere</span>
            </a>
            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><button id="logout-btn" class="btn btn-logout btn-small">Logout</button></li>
            </ul>
        </nav>
    </header>

    <main class="notes-wrapper">
        <div class="notes-header">
            <h1>My Notes 📚</h1>
            <p>Manage, upload, and securely filter your curated study materials.</p>
        </div>

        <div id="notes-alert" class="alert hidden"></div>

        <div class="notes-container">
            <!-- Left Side: Add Note Form -->
            <section class="add-note-section">
                <div class="card-outline">
                    <h2>Add a New Note</h2>
                    <form id="add-note-form" class="auth-form">
                        <div class="form-group">
                            <label for="title">Note Title</label>
                            <input type="text" id="title" placeholder="e.g. Data Structures Chapter 1" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" placeholder="e.g. Computer Science" required>
                        </div>
                        <div class="form-group">
                            <label for="semester">Semester</label>
                            <select id="semester" required>
                                <option value="" disabled selected>Select Semester...</option>
                                <option value="1">Semester 1</option>
                                <option value="2">Semester 2</option>
                                <option value="3">Semester 3</option>
                                <option value="4">Semester 4</option>
                                <option value="5">Semester 5</option>
                                <option value="6">Semester 6</option>
                                <option value="7">Semester 7</option>
                                <option value="8">Semester 8</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="pdfFile">Select Local PDF (Optional) <span class="size-hint">(Max 50MB)</span></label>
                            <input type="file" id="pdfFile" accept="application/pdf" />
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Add Note ➕</button>
                    </form>
                </div>
            </section>

            <!-- Right Side: Notes Display & Filtering -->
            <section class="view-notes-section">
                <div class="filter-bar card-outline">
                    <h3>Filter Notes</h3>
                    <div class="filter-controls">
                        <input type="text" id="filter-subject" placeholder="Filter by Subject..." aria-label="Filter by Subject">
                        <select id="filter-semester" aria-label="Filter by Semester">
                            <option value="">All Semesters</option>
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                            <option value="3">Semester 3</option>
                            <option value="4">Semester 4</option>
                            <option value="5">Semester 5</option>
                            <option value="6">Semester 6</option>
                            <option value="7">Semester 7</option>
                            <option value="8">Semester 8</option>
                        </select>
                        <button id="apply-filters-btn" class="btn btn-glass-primary btn-small">Apply</button>
                        <button id="clear-filters-btn" class="btn btn-glass-secondary btn-small">Clear</button>
                    </div>
                </div>

                <div id="notes-grid" class="notes-grid">
                    <!-- Notes will be injected here dynamically by JavaScript -->
                </div>
            </section>
        </div>
    </main>

    <script src="js/notes.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/chatbot.js"></script>
</body>
</html>
